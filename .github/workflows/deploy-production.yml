name: Deploy to production

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v5

      - name: Install Railway CLI
        run: bash <(curl -fsSL https://railway.com/install.sh)

      - name: Deploy web service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_PROD_SERVICE_ID }} --detach

      - name: Deploy scrape-cron service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_PROD_SCRAPE_CRON_SERVICE_ID }} --detach

      - name: Deploy backup-cron service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_PROD_BACKUP_CRON_SERVICE_ID }} --detach
