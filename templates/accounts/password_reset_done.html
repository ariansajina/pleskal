{% extends "base.html" %}

{% block title %}Password Reset Sent — pleskal{% endblock %}

{% block content %}
<div class="content-wrap">
    <div style="max-width:480px;margin:0 auto;text-align:center;padding-top:3rem;">
        <div style="font-size:2rem;margin-bottom:1rem;opacity:0.5;">✦</div>
        <h1 style="font-family:'Playfair Display',serif;font-weight:900;font-style:italic;font-size:1.8rem;color:var(--blue);margin-bottom:1.5rem;">
            Check Your Email
        </h1>

        <div class="alert alert--success" style="text-align:left;">
            If an account with that email exists, we've sent a reset link. Please check your inbox.
        </div>

        <p style="margin-top:1.5rem;">
            <a href="{% url 'login' %}" class="link-accent" style="font-size:0.85rem;">← Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
