{% extends "base.html" %}

{% block title %}Password Reset Sent — Copenhagen Dance Calendar{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-6">Check Your Email</h1>
    <p class="text-sm text-gray-600">
        If an account with that email exists, we've sent a reset link. Please check your inbox.
    </p>
    <p class="mt-4 text-sm">
        <a href="{% url 'login' %}" class="text-indigo-600 hover:underline">Back to login</a>
    </p>
</div>
{% endblock %}
