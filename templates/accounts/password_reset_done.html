{% extends "base.html" %}

{% block title %}Password Reset Sent — pleskal{% endblock %}

{% block content %}
<div class="content-wrap">
    <div class="auth-container text-center" style="padding-top:var(--space-12);">
        <div style="font-size:var(--text-xl);margin-bottom:var(--space-4);opacity:0.5;">✦</div>
        <h1 class="heading-page">Check Your Email</h1>

        <div class="alert alert--success" style="text-align:left;">
            If an account with that email exists, we've sent a reset link. Please check your inbox.
        </div>

        <p style="margin-top:var(--space-6);">
            <a href="{% url 'login' %}" class="link-accent text-base">← Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
