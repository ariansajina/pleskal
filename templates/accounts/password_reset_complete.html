{% extends "base.html" %}

{% block title %}Password Reset Complete — pleskal{% endblock %}

{% block content %}
<div class="content-wrap">
    <div style="max-width:480px;margin:0 auto;text-align:center;padding-top:3rem;">
        <div style="font-size:2rem;margin-bottom:1rem;opacity:0.5;">✦</div>
        <h1 style="font-family:'Playfair Display',serif;font-weight:900;font-style:italic;font-size:1.8rem;color:var(--blue);margin-bottom:1.5rem;">
            Password Reset Complete
        </h1>

        <div class="alert alert--success" style="text-align:left;margin-bottom:1.5rem;">
            Your password has been set. You can now log in.
        </div>

        <a href="{% url 'login' %}" class="btn btn--primary">Log In</a>
    </div>
</div>
{% endblock %}
