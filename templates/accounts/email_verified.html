{% extends "base.html" %}

{% block title %}Email Verified — pleskal{% endblock %}

{% block content %}
<div class="content-wrap">
    <div class="auth-container text-center" style="padding-top:var(--space-12);">
        <div style="font-size:var(--text-xl);margin-bottom:var(--space-4);opacity:0.5;">✦</div>
        <h1 class="heading-page">Email Verified</h1>

        <div class="alert alert--success" style="text-align:left;margin-bottom:var(--space-6);">
            Your email address has been verified. You can now log in.
        </div>

        <a href="{% url 'login' %}" class="btn btn--primary">Log in</a>
    </div>
</div>
{% endblock %}
