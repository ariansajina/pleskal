{% extends "base.html" %}

{% block title %}Delete Event – pleskal{% endblock %}

{% block content %}
<div class="content-wrap">
    <div style="max-width:480px;">
        <h1 class="heading-page" style="margin-bottom:var(--space-6);">
            Delete event?
        </h1>

        <div class="alert alert--error" style="margin-bottom:var(--space-6);">
            Are you sure you want to permanently delete
            <strong>{{ object.title }}</strong>?
            This cannot be undone.
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="btn-row">
                <button type="submit" class="btn btn--danger">Yes, delete</button>
                <a href="{% url 'event_detail' object.slug %}" class="btn btn--ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
