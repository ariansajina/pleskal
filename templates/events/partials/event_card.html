<div class="py-1.5 flex items-baseline gap-3 text-sm leading-snug">
    {# Time #}
    <span class="shrink-0 text-xs text-gray-400 w-11 text-right tabular-nums">
        {{ event.start_datetime|date:"H:i" }}
    </span>

    {# Title #}
    <a href="{% url 'event_detail' event.slug %}"
       class="flex-1 min-w-0 font-medium text-gray-900 hover:text-black truncate">
        {{ event.title }}
    </a>

    {# Category chip #}
    <span class="shrink-0 text-xs border border-gray-300 text-gray-500 px-1.5 py-0 leading-4 hidden sm:inline">
        {{ event.get_category_display }}
    </span>

    {# Free badge #}
    {% if event.is_free %}
        <span class="shrink-0 text-xs border border-gray-300 text-gray-500 px-1.5 py-0 leading-4 hidden sm:inline">free</span>
    {% endif %}

    {# Venue #}
    <span class="shrink-0 text-xs text-gray-400 truncate hidden md:inline max-w-36">
        {{ event.venue_name }}
    </span>
</div>
