<div id="when-filter-group" class="filter-panel__group"{% if oob %} hx-swap-oob="true"{% endif %}>
    <span class="filter-panel__group-label">When</span>
    {% if date_range_active %}
        <div style="display:flex;gap:var(--space-3);opacity:0.4;cursor:not-allowed;">
            <label style="display:flex;align-items:center;gap:var(--space-1);font-size:var(--text-sm);">
                <input type="radio" name="past" value="0" {% if not show_past %}checked{% endif %} disabled>
                <span id="upcoming-count">Upcoming ({{ upcoming_count }})</span>
            </label>
            <label style="display:flex;align-items:center;gap:var(--space-1);font-size:var(--text-sm);">
                <input type="radio" name="past" value="1" {% if show_past %}checked{% endif %} disabled>
                <span id="past-count">Past ({{ past_count }})</span>
            </label>
        </div>
        <span class="text-sm text-muted">Showing all events in selected date range</span>
    {% else %}
        <div style="display:flex;gap:var(--space-3);">
            <label style="display:flex;align-items:center;gap:var(--space-1);font-size:var(--text-sm);cursor:pointer;">
                <input type="radio" name="past" value="0" {% if not show_past %}checked{% endif %}>
                <span id="upcoming-count">Upcoming ({{ upcoming_count }})</span>
            </label>
            <label style="display:flex;align-items:center;gap:var(--space-1);font-size:var(--text-sm);cursor:pointer;">
                <input type="radio" name="past" value="1" {% if show_past %}checked{% endif %}>
                <span id="past-count">Past ({{ past_count }})</span>
            </label>
        </div>
    {% endif %}
</div>
