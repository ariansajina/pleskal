{% extends "events/moderation/base_moderation.html" %}

{% block title %}History – Moderation – pleskal{% endblock %}

{% block moderation_content %}

{# Filter #}
<form id="mod-history-form"
      hx-get="{% url 'moderation_history' %}"
      hx-target="#mod-history-list"
      hx-push-url="true"
      hx-trigger="change">
    <div class="filter-panel" style="margin-bottom:1.25rem;">
        <div class="filter-panel__group">
            <span class="filter-panel__group-label">Decision</span>
            <select name="status" class="form-select" style="width:auto;">
                <option value="">All decisions</option>
                <option value="approved" {% if selected_status == "approved" %}selected{% endif %}>Approved</option>
                <option value="rejected" {% if selected_status == "rejected" %}selected{% endif %}>Rejected</option>
            </select>
        </div>
    </div>
</form>

<div id="mod-history-list">
    {% include "events/moderation/partials/history_results.html" %}
</div>
{% endblock %}
