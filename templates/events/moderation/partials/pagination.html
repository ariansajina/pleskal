{% if page_obj.has_other_pages %}
    <nav class="mt-4 flex items-center gap-3 text-xs text-gray-500" aria-label="Pagination">
        {% if page_obj.has_previous %}
            <a href="?page={{ page_obj.previous_page_number }}"
               class="border border-gray-300 px-3 py-1 hover:bg-gray-50"
               hx-get="?page={{ page_obj.previous_page_number }}"
               hx-target="{{ target }}"
               hx-push-url="true">
                &larr; Prev
            </a>
        {% endif %}

        <span class="text-gray-400">{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>

        {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}"
               class="border border-gray-300 px-3 py-1 hover:bg-gray-50"
               hx-get="?page={{ page_obj.next_page_number }}"
               hx-target="{{ target }}"
               hx-push-url="true">
                Next &rarr;
            </a>
        {% endif %}
    </nav>
{% endif %}
