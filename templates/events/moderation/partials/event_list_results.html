{% if events %}
    <div style="border:1.5px solid var(--border-light);">
        {% for event in events %}
            {% include "events/moderation/partials/event_row.html" with event=event %}
        {% endfor %}
    </div>

    {% include "events/moderation/partials/pagination.html" with base_url="moderation_events" target="#mod-event-list" %}
{% else %}
    <p style="font-size:0.78rem;color:var(--ink-muted);padding:2rem 0;text-align:center;">No events found.</p>
{% endif %}
