{% if users %}
    <div style="border:1.5px solid var(--border-light);">
        {% for u in users %}
            {% include "events/moderation/partials/user_row.html" with u=u %}
        {% endfor %}
    </div>

    {% include "events/moderation/partials/pagination.html" with base_url="moderation_users" target="#mod-user-list" %}
{% else %}
    <p style="font-size:0.78rem;color:var(--ink-muted);padding:2rem 0;text-align:center;">No users found.</p>
{% endif %}
