{% extends "base.html" %}

{% block content %}
<div class="content-wrap" style="max-width:1000px;">

    {# Moderation nav #}
    <div style="display:flex;align-items:center;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap;">
        <span style="font-family:'Playfair Display',serif;font-weight:700;font-size:1rem;color:var(--blue);flex-shrink:0;">
            Moderation
        </span>
        <div class="page-tabs" style="flex:1;">
            <a href="{% url 'moderation_dashboard' %}"
               class="page-tab {% if active_tab == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="{% url 'moderation_events' %}"
               class="page-tab {% if active_tab == 'events' %}active{% endif %}">Events</a>
            <a href="{% url 'moderation_users' %}"
               class="page-tab {% if active_tab == 'users' %}active{% endif %}">Users</a>
            <a href="{% url 'moderation_history' %}"
               class="page-tab {% if active_tab == 'history' %}active{% endif %}">History</a>
        </div>
    </div>

    {% block moderation_content %}{% endblock %}
</div>
{% endblock %}
