{% extends "base.html" %}

{% block content %}
<div class="max-w-5xl mx-auto">
    {# Moderation nav #}
    <div class="flex items-center gap-6 border-b border-gray-200 mb-6 pb-2">
        <h1 class="text-lg font-bold text-gray-900">Moderation</h1>
        <nav class="flex gap-4 text-sm">
            <a href="{% url 'moderation_dashboard' %}"
               class="{% if active_tab == 'dashboard' %}text-black font-medium border-b-2 border-black{% else %}text-gray-500 hover:text-black{% endif %} pb-1">
                Dashboard
            </a>
            <a href="{% url 'moderation_events' %}"
               class="{% if active_tab == 'events' %}text-black font-medium border-b-2 border-black{% else %}text-gray-500 hover:text-black{% endif %} pb-1">
                Events
            </a>
            <a href="{% url 'moderation_users' %}"
               class="{% if active_tab == 'users' %}text-black font-medium border-b-2 border-black{% else %}text-gray-500 hover:text-black{% endif %} pb-1">
                Users
            </a>
            <a href="{% url 'moderation_history' %}"
               class="{% if active_tab == 'history' %}text-black font-medium border-b-2 border-black{% else %}text-gray-500 hover:text-black{% endif %} pb-1">
                History
            </a>
        </nav>
    </div>

    {% block moderation_content %}{% endblock %}
</div>
{% endblock %}
