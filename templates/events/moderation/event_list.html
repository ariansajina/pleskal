{% extends "events/moderation/base_moderation.html" %}

{% block title %}Events – Moderation – pleskal{% endblock %}

{% block moderation_content %}

{# Filters #}
<form id="mod-filter-form"
      hx-get="{% url 'moderation_events' %}"
      hx-target="#mod-event-list"
      hx-push-url="true"
      hx-trigger="change, submit">
    <div class="filter-panel" style="margin-bottom:1.25rem;">
        <div class="filter-panel__group" style="flex:1;min-width:160px;">
            <span class="filter-panel__group-label">Search</span>
            <input type="search" name="q" value="{{ search_query }}"
                   placeholder="Search events or users…"
                   hx-get="{% url 'moderation_events' %}"
                   hx-target="#mod-event-list"
                   hx-push-url="true"
                   hx-trigger="keyup changed delay:400ms"
                   hx-include="#mod-filter-form"
                   class="form-input">
        </div>

        <div class="filter-panel__group">
            <span class="filter-panel__group-label">Status</span>
            <select name="status" class="form-select" style="width:auto;">
                <option value="">All statuses</option>
                {% for value, label in status_choices %}
                    <option value="{{ value }}" {% if value == selected_status %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="filter-panel__group">
            <span class="filter-panel__group-label">Category</span>
            <select name="category" class="form-select" style="width:auto;">
                <option value="">All categories</option>
                {% for value, label in category_choices %}
                    <option value="{{ value }}" {% if value == selected_category %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="filter-panel__group" style="justify-content:flex-end;">
            <button type="submit" class="btn btn--sm">Apply</button>
        </div>
    </div>
</form>

{# Results #}
<div id="mod-event-list">
    {% include "events/moderation/partials/event_list_results.html" %}
</div>
{% endblock %}
