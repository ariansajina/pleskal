{% if page_obj.has_other_pages %}
<nav class="mt-6" style="display:flex;justify-content:center;align-items:center;gap:0.75rem;" aria-label="Pagination">
    {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}" class="btn btn--ghost btn--sm">
        &larr; Prev
    </a>
    {% endif %}

    <span style="font-size:0.73rem;color:var(--ink-muted);">
        {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}
    </span>

    {% if page_obj.has_next %}
    <a href="?page={{ page_obj.next_page_number }}" class="btn btn--ghost btn--sm">
        Next &rarr;
    </a>
    {% endif %}
</nav>
{% endif %}
