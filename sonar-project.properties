sonar.projectKey=ariansajina_pleskal
sonar.organization=ariansajina

sonar.projectName=pleskal
sonar.projectDescription=local community calendar

# Source and test paths
sonar.sources=accounts,events
sonar.tests=accounts/tests,events/tests
sonar.exclusions=**/migrations/**,**/tests/**,**/conftest.py,events/management/commands/*.py
sonar.coverage.exclusions=**/tests/**,**/conftest.py

# Python version
sonar.python.version=3.13

# Coverage report (generated by pytest-cov in CI)
sonar.python.coverage.reportPaths=coverage.xml
